databases:
- name: ai-finance-db
  databaseName: ai_finance
  plan: free
  region: singapore
services:
- type: web
  name: ai-finance-tracker
  runtime: python
  region: singapore
  plan: free
  buildCommand: ./build.sh
  startCommand: ./start.sh
  envVars:
  - key: DATABASE_URL
    fromDatabase:
      name: ai-finance-db
      property: connectionString
  - key: DJANGO_SECRET_KEY
    generateValue: true
  - key: DEBUG
    value: 'False'
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: GEMINI_API_KEY
    sync: false
  - key: PYTHON_VERSION
    value: 3.12.0
  - key: ALLOWED_HOSTS
    value: .onrender.com
  - key: NODE_VERSION
    value: 20.13.0
  - key: RUN_MIGRATE
    value: 'false'
  - key: RUN_MIGRATE_ON_START
    value: 'true'
  - key: RUN_COLLECTSTATIC
    value: 'true'
  - key: RUN_BOT_IN_WEB
    value: 'true'
  - key: BOT_MODE
    value: polling
  - key: PIP_NO_CACHE_DIR
    value: '1'
  - key: PIP_DISABLE_PIP_VERSION_CHECK
    value: '1'
- type: worker
  name: ai-finance-bot
  runtime: python
  plan: free
  region: singapore
  buildCommand: ./build.sh
  startCommand: python manage.py run_bot
  envVars:
  - key: BOT_MODE
    value: polling
  - key: DATABASE_URL
    fromDatabase:
      name: ai-finance-db
      property: connectionString
  - key: DJANGO_SECRET_KEY
    generateValue: true
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  - key: GEMINI_API_KEY
    sync: false
  - key: PYTHON_VERSION
    value: 3.12.0
  - key: NODE_VERSION
    value: 20.13.0
  - key: BUILD_FRONTEND
    value: 'false'
  - key: RUN_COLLECTSTATIC
    value: 'false'
  - key: RUN_MIGRATE
    value: 'false'
  - key: PIP_NO_CACHE_DIR
    value: '1'
  - key: PIP_DISABLE_PIP_VERSION_CHECK
    value: '1'
