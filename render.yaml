databases:
  - name: ai-finance-db
    databaseName: ai_finance
    plan: free
    region: singapore

services:
  - type: web
    name: ai-finance-tracker
    runtime: python
    region: singapore
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-finance-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

  - type: worker
    name: ai-finance-bot
    runtime: python
    plan: free
    region: singapore
    buildCommand: "./build.sh"
    startCommand: "python manage.py run_bot"
    envVars:
      - key: BOT_MODE
        value: "polling"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-finance-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Webhook mode (optional): set BOT_MODE=webhook and provide one of below.
      # - key: BOT_WEBHOOK_BASE_URL
      #   value: "https://your-bot-web-service.onrender.com"
      # - key: BOT_WEBHOOK_PATH
      #   value: "telegram/webhook"
      # - key: BOT_WEBHOOK_URL
      #   value: "https://your-bot-web-service.onrender.com/telegram/webhook"
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
