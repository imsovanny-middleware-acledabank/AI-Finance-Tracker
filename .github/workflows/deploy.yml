name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Continuous Integration ────────────────────────────────────────────────
  ci:
    name: Lint & Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        env:
          DEBUG: "False"
          DJANGO_SECRET_KEY: "ci-placeholder-key-abcdefghijklmnopqrstuvwxyz0123456789-not-for-prod"
          ALLOWED_HOSTS: "localhost"
          DATABASE_URL: sqlite:///ci.sqlite3
        run: python manage.py check --deploy

      - name: Run migrations (dry-run)
        env:
          DEBUG: "False"
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production
          DATABASE_URL: sqlite:///ci.sqlite3
        run: python manage.py migrate --run-syncdb

  # ── Deploy to Render (push to main only) ─────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions: {}

    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_URL in your GitHub repository secrets.
        # In Render: Dashboard → your service → Settings → Deploy Hook → copy URL.
        if: secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -s --fail-with-body \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deployment triggered."
