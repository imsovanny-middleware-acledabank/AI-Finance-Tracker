<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Finance Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00D9FF;
            --primary-dark: #0097A7;
            --bg1: #E0F7FA;
            --bg2: #B3E5FC;
            --bg3: #81D4FA;
            --text: #0D47A1;
            --muted: rgba(13, 71, 161, 0.7);
            --card: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 217, 255, 0.25);
            --err-bg: rgba(255, 23, 68, 0.15);
            --err-border: rgba(255, 23, 68, 0.35);
            --err: #FF1744;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #E0F7FA 0%, #B3E5FC 50%, #81D4FA 100%);
            background-attachment: fixed;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(29, 233, 182, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes flowLogin1 {
            0% {
                transform: translateX(-100%) translateY(-15px);
            }

            100% {
                transform: translateX(100%) translateY(15px);
            }
        }

        @keyframes flowLogin2 {
            0% {
                transform: translateX(-100%) translateY(5px);
            }

            100% {
                transform: translateX(100%) translateY(-10px);
            }
        }

        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 0;
            width: 200%;
            height: 300px;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 200 Q300 100 600 200 T1200 200' stroke='rgba(0,217,255,0.15)' stroke-width='2' fill='none'/%3E%3Cpath d='M0 250 Q300 150 600 250 T1200 250' stroke='rgba(0,217,255,0.1)' stroke-width='2' fill='none'/%3E%3Cpath d='M0 180 Q300 80 600 180 T1200 180' stroke='rgba(29,233,182,0.12)' stroke-width='2' fill='none'/%3E%3C/svg%3E") repeat-x;
            background-size: 600px 100%;
            animation: flowLogin1 15s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .card {
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(179, 229, 252, 0.85) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 16px 42px rgba(0, 188, 212, 0.25);
            position: relative;
            z-index: 100;
        }

        .logo {
            width: 84px;
            height: 84px;
            border-radius: 18px;
            margin: 0 auto 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
            background: rgba(255, 255, 255, 0.06);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            margin: 8px 0 22px;
            text-align: center;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .login-form {
            margin-top: 12px;
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(0, 217, 255, 0.3);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            color: var(--text);
            font-size: 16px;
            outline: none;
            margin-bottom: 14px;
            transition: all .3s ease;
        }

        .login-input::placeholder {
            color: rgba(13, 71, 161, 0.5);
        }

        .login-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #0097A7 0%, #00D9FF 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 188, 212, 0.4);
            cursor: pointer;
            transition: all .3s ease;
        }

        .login-btn:active {
            transform: scale(.98);
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.3);
        }

        .login-btn:hover {
            filter: brightness(1.05);
        }

        .small-note {
            margin-top: 12px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        .err {
            display: none;
            margin-top: 14px;
            border: 1px solid var(--err-border);
            background: var(--err-bg);
            color: var(--err);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .fallback {
            margin-top: 14px;
            text-align: center;
        }

        .fallback a {
            color: #c7bfff;
            text-decoration: none;
            font-weight: 600;
        }

        .fallback a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <img src="/logo.jpg" alt="ExpenseAI logo">
        </div>
        <h1>AI Finance Bot</h1>
        <p class="subtitle">Login with your Telegram ID.</p>

        <form class="login-form" method="post" action="/login/?next={{ next|urlencode }}">
            {% csrf_token %}
            <label class="field-label" for="telegram_id">Type ID</label>
            <input class="login-input" id="telegram_id" name="telegram_id" type="text" inputmode="numeric"
                placeholder="Enter Telegram ID" value="{{ entered_telegram_id }}" autocomplete="off" required>
            <button class="login-btn" type="submit">Login</button>
        </form>

        <div class="small-note" id="loginNote">Login securely with Telegram</div>
        <div id="errorBox" class="err"></div>
    </div>

    <script>
        const inputEl = document.getElementById('telegram_id');
        const noteEl = document.getElementById('loginNote');

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }

        function autoFillFromTelegramWebApp() {
            const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user || !tg.initDataUnsafe.user.id) {
                return;
            }

            const user = tg.initDataUnsafe.user;
            if (!inputEl.value.trim()) {
                inputEl.value = String(user.id);
            }

            if (noteEl) {
                const displayName = [user.first_name, user.last_name].filter(Boolean).join(' ').trim();
                noteEl.textContent = displayName
                    ? `Connected from Telegram as ${displayName}`
                    : 'Connected from Telegram';
            }

            try {
                tg.ready();
                tg.expand();
            } catch (err) {
                // Ignore Telegram WebApp UI errors and continue login flow.
            }

        }

        function renderCallbackErrorFromQuery() {
            const serverError = `{{ error_message|escapejs }}`.trim();
            if (serverError) {
                showError(serverError);
                return;
            }

            const params = new URLSearchParams(window.location.search || '');
            const error = (params.get('error') || '').trim();
            if (!error) return;

            const errorMap = {
                invalid_hash: 'Telegram auth failed (invalid hash). Please ensure BotFather /setdomain matches exactly and try again.',
                bot_not_configured: 'Bot token is not configured on server.',
                missing_auth_data: 'Telegram did not return complete auth data. Please use the main Login with Telegram button and try again.',
            };

            showError(errorMap[error] || `Login failed: ${error}`);
        }
        autoFillFromTelegramWebApp();
        renderCallbackErrorFromQuery();
    </script>
</body>

</html>
