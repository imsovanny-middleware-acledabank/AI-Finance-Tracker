<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Finance Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00D9FF;
            --text: #0D47A1;
            --muted: rgba(13, 71, 161, 0.7);
            --border: rgba(0, 217, 255, 0.25);
            --err-bg: rgba(255, 23, 68, 0.15);
            --err-border: rgba(255, 23, 68, 0.35);
            --err: #FF1744;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #E0F7FA 0%, #B3E5FC 50%, #81D4FA 100%);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(179, 229, 252, 0.85) 100%);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 16px 42px rgba(0, 188, 212, 0.25);
        }

        .logo {
            width: 84px;
            height: 84px;
            border-radius: 18px;
            margin: 0 auto 14px;
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            margin: 8px 0 20px;
            text-align: center;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(0, 217, 255, 0.3);
            background: rgba(255, 255, 255, 0.7);
            color: var(--text);
            font-size: 16px;
            outline: none;
            margin-bottom: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #0097A7 0%, #00D9FF 100%);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        .small-note {
            margin-top: 12px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        .err {
            display: none;
            margin-top: 14px;
            border: 1px solid var(--err-border);
            background: var(--err-bg);
            color: var(--err);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
        }

        .otp-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 999;
            place-items: center;
            padding: 20px;
        }

        .otp-input-wrap {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 12px 0 16px;
        }

        @keyframes otpSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes otpPulse {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .otp-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0 12px;
            color: var(--muted);
            font-size: 13px;
            animation: otpPulse 1.2s ease-in-out infinite;
        }

        .otp-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 151, 167, 0.25);
            border-top-color: #0097A7;
            border-radius: 50%;
            animation: otpSpin 0.8s linear infinite;
        }

        .otp-input {
            width: 44px;
            height: 52px;
            border-radius: 10px;
            border: 1.5px solid rgba(0, 217, 255, 0.55);
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            background: rgba(255, 255, 255, 0.9);
            outline: none;
        }

        .btn-secondary {
            margin-top: 8px;
            width: 100%;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 23, 68, 0.45);
            background: rgba(255, 23, 68, 0.15);
            color: #B71C1C;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <img src="/logo.jpg" alt="ExpenseAI logo">
        </div>
        <h1>AI Finance Bot</h1>
        <p class="subtitle">បញ្ចូល Telegram ID រួចចុច Login ដើម្បីទទួល OTP។</p>

        <form class="login-form" method="post" action="/login/?next={{ next|urlencode }}">
            {% csrf_token %}
            <label class="field-label" for="telegram_id">Telegram ID</label>
            <input class="login-input" id="telegram_id" name="telegram_id" type="text" inputmode="numeric"
                placeholder="Enter Telegram ID" value="{{ entered_telegram_id }}" autocomplete="off" required>
            <button class="login-btn" type="submit" id="loginBtn">Login</button>
        </form>

        <div class="small-note" id="loginNote">អ្នកអាច copy/paste OTP 6 ខ្ទង់ រួចចុច Verify</div>
        <div id="errorBox" class="err"></div>
    </div>

    <div id="otpModal" class="otp-modal">
        <div class="card" style="max-width: 390px;">
            <h2 style="margin: 0 0 8px; text-align: center;">Verify OTP</h2>
            <p style="margin: 0; text-align: center; color: var(--muted); font-size: 13px;">សូម paste ឬវាយ OTP 6 ខ្ទង់
                រួចចុច Verify។</p>

            <div class="otp-input-wrap">
                <input type="text" class="otp-input" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" class="otp-input" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" class="otp-input" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" class="otp-input" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" class="otp-input" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" class="otp-input" inputmode="numeric" autocomplete="one-time-code">
            </div>

            <button class="login-btn" id="verifyOtpBtn" type="button">Verify</button>
            <button class="btn-secondary" id="cancelOtpBtn" type="button">Cancel</button>
            <div id="otpError" class="err"></div>
        </div>
    </div>

    <script>
        const inputEl = document.getElementById('telegram_id');
        const noteEl = document.getElementById('loginNote');
        const errorBox = document.getElementById('errorBox');
        const otpModal = document.getElementById('otpModal');
        const otpError = document.getElementById('otpError');
        const otpInputs = Array.from(document.querySelectorAll('.otp-input'));

        let otpSessionId = null;
        let otpTelegramId = null;

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }

        function hideError() {
            errorBox.style.display = 'none';
        }

        function showOtpError(msg) {
            otpError.textContent = msg;
            otpError.style.display = 'block';
        }

        function hideOtpError() {
            otpError.style.display = 'none';
        }

        function setOtpValue(code) {
            const value = String(code || '').replace(/\D/g, '').slice(0, 6);
            otpInputs.forEach((el, idx) => {
                el.value = value[idx] || '';
            });
        }

        function handleOtpPasteText(text) {
            const value = String(text || '').replace(/\D/g, '').slice(0, 6);
            if (!value) return;
            setOtpValue(value);
            const nextIndex = Math.min(value.length, otpInputs.length - 1);
            otpInputs[nextIndex].focus();
        }

        async function fallbackPasteFromClipboard() {
            try {
                if (!navigator.clipboard || !navigator.clipboard.readText) return;
                const text = await navigator.clipboard.readText();
                handleOtpPasteText(text);
            } catch (_err) {
                // browser may block clipboard read without permission
            }
        }

        function getOtpValue() {
            return otpInputs.map((el) => el.value.trim()).join('');
        }

        function openOtpModal() {
            otpModal.style.display = 'grid';
            hideOtpError();
        }

        function closeOtpModal() {
            otpModal.style.display = 'none';
            setOtpValue('');
            hideOtpError();
        }

        async function requestOtp() {
            hideError();
            const telegramId = inputEl.value.trim();
            if (!telegramId) {
                showError('Please enter Telegram ID');
                return;
            }

            try {
                const response = await fetch('/auth/request-otp/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: Number(telegramId),
                    }),
                });
                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Failed to request OTP');
                    return;
                }

                otpSessionId = data.session_id;
                otpTelegramId = telegramId;
                openOtpModal();
            } catch (err) {
                showError('Network error: ' + err.message);
            }
        }

        async function verifyOtp() {
            hideOtpError();
            const otpCode = getOtpValue();
            if (otpCode.length !== 6) {
                showOtpError('OTP is incomplete');
                return;
            }

            try {
                const response = await fetch('/auth/verify-otp/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: otpSessionId,
                        telegram_id: Number(otpTelegramId),
                        otp_code: otpCode,
                    }),
                });
                const data = await response.json();
                if (!response.ok) {
                    showOtpError(data.error || 'Verify failed');
                    return;
                }

                const nextUrl = new URLSearchParams(window.location.search).get('next') || '/app/';
                window.location.href = nextUrl;
            } catch (err) {
                showOtpError('Network error: ' + err.message);
            }
        }

        function autoFillFromTelegramWebApp() {
            const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user || !tg.initDataUnsafe.user.id) {
                return;
            }

            const user = tg.initDataUnsafe.user;
            if (!inputEl.value.trim()) {
                inputEl.value = String(user.id);
            }

            if (noteEl) {
                const displayName = [user.first_name, user.last_name].filter(Boolean).join(' ').trim();
                noteEl.textContent = displayName
                    ? `Connected from Telegram as ${displayName}`
                    : 'Connected from Telegram';
            }

            try {
                tg.ready();
                tg.expand();
            } catch (_err) {
                // no-op
            }
        }

        function renderCallbackErrorFromQuery() {
            const serverError = `{{ error_message|escapejs }}`.trim();
            if (serverError) {
                showError(serverError);
                return;
            }

            const params = new URLSearchParams(window.location.search || '');
            const error = (params.get('error') || '').trim();
            if (!error) return;

            const errorMap = {
                invalid_hash: 'Telegram auth failed. Please try again.',
                bot_not_configured: 'Bot token is not configured on server.',
                missing_auth_data: 'Telegram did not return complete auth data.',
            };
            showError(errorMap[error] || `Login failed: ${error}`);
        }

        otpInputs.forEach((input, index) => {
            input.addEventListener('beforeinput', (e) => {
                if (e.inputType === 'insertFromPaste' && e.data && e.data.length > 1) {
                    e.preventDefault();
                    handleOtpPasteText(e.data);
                }
            });

            input.addEventListener('input', () => {
                const raw = input.value.replace(/\D/g, '');
                if (raw.length > 1) {
                    handleOtpPasteText(raw);
                    return;
                }
                input.value = raw.slice(-1);
                if (input.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData || window.clipboardData).getData('text') || '';
                if (pasted) {
                    handleOtpPasteText(pasted);
                } else {
                    fallbackPasteFromClipboard();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
                if (e.key === 'Enter') {
                    verifyOtp();
                }
            });
        });

        document.addEventListener('paste', (e) => {
            if (otpModal.style.display !== 'grid') return;
            const active = document.activeElement;
            if (!otpInputs.includes(active)) return;
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text') || '';
            if (pasted) {
                handleOtpPasteText(pasted);
            } else {
                fallbackPasteFromClipboard();
            }
        });

        document.querySelector('.login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            requestOtp();
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', verifyOtp);
        document.getElementById('cancelOtpBtn').addEventListener('click', closeOtpModal);

        autoFillFromTelegramWebApp();
        renderCallbackErrorFromQuery();
    </script>
</body>

</html>
