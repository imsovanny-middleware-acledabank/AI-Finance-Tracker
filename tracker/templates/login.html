<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Finance Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #6C5CE7;
            --bg1: #0f0c29;
            --bg2: #302b63;
            --bg3: #24243e;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.72);
            --card: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.18);
            --err-bg: rgba(255, 107, 107, 0.15);
            --err-border: rgba(255, 107, 107, 0.35);
            --err: #ff9f9f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.25);
        }

        .logo {
            width: 84px;
            height: 84px;
            border-radius: 18px;
            margin: 0 auto 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
            background: rgba(255, 255, 255, 0.06);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            margin: 8px 0 22px;
            text-align: center;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .login-form {
            margin-top: 12px;
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font-size: 16px;
            outline: none;
            margin-bottom: 14px;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        .login-btn {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: linear-gradient(135deg, #5fb3f2, #4a9de6);
            color: #0f2b46;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(74, 157, 230, 0.35);
            cursor: pointer;
        }

        .login-btn:hover {
            filter: brightness(1.05);
        }

        .small-note {
            margin-top: 12px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        .err {
            display: none;
            margin-top: 14px;
            border: 1px solid var(--err-border);
            background: var(--err-bg);
            color: var(--err);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .fallback {
            margin-top: 14px;
            text-align: center;
        }

        .fallback a {
            color: #c7bfff;
            text-decoration: none;
            font-weight: 600;
        }

        .fallback a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <img src="/logo.jpg" alt="ExpenseAI logo">
        </div>
        <h1>AI Finance Bot</h1>
        <p class="subtitle">Login with your Telegram ID.</p>

        <form class="login-form" method="post" action="/login/?next={{ next|urlencode }}">
            {% csrf_token %}
            <label class="field-label" for="telegram_id">Type ID</label>
            <input class="login-input" id="telegram_id" name="telegram_id" type="text" inputmode="numeric"
                placeholder="Enter Telegram ID" value="{{ entered_telegram_id }}" autocomplete="off" required>
            <button class="login-btn" type="submit">Login</button>
        </form>

        <div class="small-note" id="loginNote">Login securely with Telegram</div>
        <div id="errorBox" class="err"></div>
    </div>

    <script>
        const inputEl = document.getElementById('telegram_id');
        const noteEl = document.getElementById('loginNote');

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }

        function autoFillFromTelegramWebApp() {
            const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
            if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user || !tg.initDataUnsafe.user.id) {
                return;
            }

            const user = tg.initDataUnsafe.user;
            if (!inputEl.value.trim()) {
                inputEl.value = String(user.id);
            }

            if (noteEl) {
                const displayName = [user.first_name, user.last_name].filter(Boolean).join(' ').trim();
                noteEl.textContent = displayName
                    ? `Connected from Telegram as ${displayName}`
                    : 'Connected from Telegram';
            }

            try {
                tg.ready();
                tg.expand();
            } catch (err) {
                // Ignore Telegram WebApp UI errors and continue login flow.
            }

        }

        function renderCallbackErrorFromQuery() {
            const serverError = `{{ error_message|escapejs }}`.trim();
            if (serverError) {
                showError(serverError);
                return;
            }

            const params = new URLSearchParams(window.location.search || '');
            const error = (params.get('error') || '').trim();
            if (!error) return;

            const errorMap = {
                invalid_hash: 'Telegram auth failed (invalid hash). Please ensure BotFather /setdomain matches exactly and try again.',
                bot_not_configured: 'Bot token is not configured on server.',
                missing_auth_data: 'Telegram did not return complete auth data. Please use the main Login with Telegram button and try again.',
            };

            showError(errorMap[error] || `Login failed: ${error}`);
        }
        autoFillFromTelegramWebApp();
        renderCallbackErrorFromQuery();
    </script>
</body>

</html>
