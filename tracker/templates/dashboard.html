<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finance Bot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            flex: 1;
            min-width: 300px;
        }
        
        #userDisplay {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
        
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            opacity: 0.7;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        
        .stat-card.income .value {
            color: #10b981;
        }
        
        .stat-card.expense .value {
            color: #ef4444;
        }
        
        .stat-card.net .value {
            color: #667eea;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .chart-container h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        
        .chart-wrapper {
            position: relative;
            height: 300px;
        }
        
        .transactions-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .transactions-container h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            transition: background-color 0.3s ease;
        }
        
        .transaction-item:hover {
            background-color: #f9fafb;
        }
        
        .transaction-item:last-child {
            border-bottom: none;
        }
        
        .transaction-info {
            flex: 1;
        }
        
        .transaction-info h4 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .transaction-info p {
            color: #999;
            font-size: 0.9em;
        }
        
        .transaction-amount {
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .transaction-amount.income {
            color: #10b981;
        }
        
        .transaction-amount.expense {
            color: #ef4444;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c00;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8em;
            }
            
            .stat-card .value {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>💰 AI Finance Tracker</h1>
                <p>Real-time Financial Dashboard</p>
            </div>
            <div id="userDisplay" style="text-align: right; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px;">
                <div style="color: white; font-size: 14px; margin-bottom: 10px;">
                    <span id="userDisplayName"></span> (ID: <span id="userDisplayId"></span>)
                </div>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card income">
                <h3>Total Income</h3>
                <div class="value" id="totalIncome">$0.00</div>
            </div>
            
            <div class="stat-card expense">
                <h3>Total Expenses</h3>
                <div class="value" id="totalExpense">$0.00</div>
            </div>
            
            <div class="stat-card net">
                <h3>Net Balance</h3>
                <div class="value" id="netBalance">$0.00</div>
            </div>
            
            <div class="stat-card">
                <h3>Transactions</h3>
                <div class="value" id="transactionCount">0</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <h3>📊 Expenses by Category</h3>
                <div class="chart-wrapper">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <h3>📈 Monthly Trends</h3>
                <div class="chart-wrapper">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="transactions-container">
            <h3>📝 Recent Transactions</h3>
            <div id="transactionsList"></div>
        </div>
    </div>
    
    <script>
        // Get telegram_id from URL parameter or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        let sessionToken = urlParams.get('token') || getCookie('telegram_session');
        let TELEGRAM_ID = null;
        let USER_DATA = null;
        
        let categoryChart = null;
        let trendChart = null;
        
        // Check authentication
        async function checkAuth() {
            if (!sessionToken && !getCookie('telegram_session')) {
                // Not logged in, redirect to login
                window.location.href = '/login/';
                return false;
            }
            
            try {
                const response = await fetch('/auth/user/');
                const data = await response.json();
                
                if (response.ok) {
                    USER_DATA = data;
                    TELEGRAM_ID = data.id;
                    localStorage.setItem('telegram_id', TELEGRAM_ID);
                    sessionToken = getCookie('telegram_session');
                    return true;
                } else {
                    // Session invalid
                    window.location.href = '/login/';
                    return false;
                }
            } catch (e) {
                console.error('Auth check failed:', e);
                window.location.href = '/login/';
                return false;
            }
        }
        
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
        
        async function logout() {
            try {
                await fetch('/auth/logout/', { method: 'POST' });
                window.location.href = '/login/';
            } catch (e) {
                console.error('Logout error:', e);
            }
        }
        
        // Display user info
        function updateUserDisplay() {
            if (USER_DATA) {
                const userDisplay = document.getElementById('userDisplay');
                userDisplay.innerHTML = `
                    <span>${USER_DATA.first_name} (ID: ${USER_DATA.id})</span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                `;
            }
        }
        
        async function loadStatistics() {
            try {
                const response = await fetch(`/api/transactions/statistics/?telegram_id=${TELEGRAM_ID}`);
                const data = await response.json();
                
                document.getElementById('totalIncome').textContent = `$${parseFloat(data.total_income).toFixed(2)}`;
                document.getElementById('totalExpense').textContent = `$${parseFloat(data.total_expenses).toFixed(2)}`;
                document.getElementById('netBalance').textContent = `$${parseFloat(data.net).toFixed(2)}`;
                document.getElementById('transactionCount').textContent = data.transaction_count;
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }
        
        async function loadCategoryChart() {
            try {
                const response = await fetch(`/api/transactions/by_category/?telegram_id=${TELEGRAM_ID}`);
                const data = await response.json();
                
                const labels = data.map(item => item.category);
                const amounts = data.map(item => item.total_amount);
                
                const ctx = document.getElementById('categoryChart').getContext('2d');
                
                if (categoryChart) {
                    categoryChart.destroy();
                }
                
                categoryChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: amounts,
                            backgroundColor: [
                                '#667eea',
                                '#764ba2',
                                '#f093fb',
                                '#4facfe',
                                '#00f2fe',
                                '#43e97b',
                                '#fa709a',
                                '#fee140',
                                '#30cfd0',
                                '#330867'
                            ],
                            borderColor: 'white',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading category chart:', error);
            }
        }
        
        async function loadTrendChart() {
            try {
                const response = await fetch(`/api/transactions/monthly_trend/?telegram_id=${TELEGRAM_ID}`);
                const data = await response.json();
                
                const labels = data.map(item => item.month);
                const incomeData = data.map(item => item.income);
                const expenseData = data.map(item => item.expenses);
                
                const ctx = document.getElementById('trendChart').getContext('2d');
                
                if (trendChart) {
                    trendChart.destroy();
                }
                
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Income',
                                data: incomeData,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                borderWidth: 2,
                                tension: 0.4,
                                fill: true
                            },
                            {
                                label: 'Expenses',
                                data: expenseData,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                borderWidth: 2,
                                tension: 0.4,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading trend chart:', error);
            }
        }
        
        async function loadRecentTransactions() {
            try {
                const response = await fetch(`/api/transactions/recent/?telegram_id=${TELEGRAM_ID}`);
                const data = await response.json();
                
                const container = document.getElementById('transactionsList');
                
                if (data.length === 0) {
                    container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">No transactions yet</p>';
                    return;
                }
                
                container.innerHTML = data.map(transaction => {
                    const date = new Date(transaction.date).toLocaleDateString();
                    const time = new Date(transaction.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const isIncome = transaction.type === 'income';
                    const amountClass = isIncome ? 'income' : 'expense';
                    const sign = isIncome ? '+' : '-';
                    
                    return `
                        <div class="transaction-item">
                            <div class="transaction-info">
                                <h4>${transaction.category}</h4>
                                <p>${transaction.description || date} - ${time}</p>
                            </div>
                            <div class="transaction-amount ${amountClass}">
                                ${sign}$${parseFloat(transaction.amount).toFixed(2)}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }
        
        // Load all data
        async function loadAllData() {
            await Promise.all([
                loadStatistics(),
                loadCategoryChart(),
                loadTrendChart(),
                loadRecentTransactions()
            ]);
        }
        
        function updateUserDisplay() {
            if (USER_DATA) {
                document.getElementById('userDisplayName').textContent = USER_DATA.first_name || 'User';
                document.getElementById('userDisplayId').textContent = USER_DATA.id;
            }
        }
        
        // Initialize dashboard
        async function initDashboard() {
            const isAuthenticated = await checkAuth();
            if (isAuthenticated) {
                updateUserDisplay();
                await loadAllData();
                // Refresh every 30 seconds
                setInterval(loadAllData, 30000);
            }
        }
        
        // Initial load
        initDashboard();
    </script>
</body>
</html>
